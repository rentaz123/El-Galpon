function Alumnos({ alumnos, setAlumnos }) {
  const [search, setSearch] = useState("");
  const [filtro, setFiltro] = useState("todos");
  const [modal, setModal] = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [form, setForm] = useState({ nombre:"", subtipo:"skate", plan:"2x" });

  const filtered = alumnos.filter(a => {
    const ms = a.nombre.toLowerCase().includes(search.toLowerCase());
    const mf = filtro==="todos"?true:filtro==="deudores"?!a.pagado&&a.estado!=="baja":filtro==="mora"?a.mora:filtro==="altas"?a.estado==="alta":filtro==="bajas"?a.estado==="baja":a.subtipo===filtro;
    return ms&&mf;
  });

  const togglePago = id => setAlumnos(prev=>prev.map(a=>a.id===id?{...a,pagado:!a.pagado}:a));
  const eliminar   = id => { if(confirm("¿Eliminar?")) setAlumnos(prev=>prev.filter(a=>a.id!==id)); };

  const quitarDeHorario = (nombre) => {
    try {
      const saved = localStorage.getItem("galpon_horarios");
      const data  = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(HORARIOS));
      const nombreLower = nombre.toLowerCase();
      Object.keys(data).forEach(turno => {
        Object.keys(data[turno]).forEach(dia => {
          if(data[turno][dia]?.alumnos) {
            data[turno][dia].alumnos = data[turno][dia].alumnos.filter(a => {
              // Match flexible: compara palabras del nombre del alumno contra palabras del horario
              const palabrasAlumno   = nombreLower.split(" ");
              const palabrasHorario  = a.toLowerCase().split(" ");
              const coincidencias    = palabrasAlumno.filter(p=>palabrasHorario.includes(p));
              return coincidencias.length < 2; // si coinciden 2+ palabras, es el mismo → lo quita
            });
          }
        });
      });
      localStorage.setItem("galpon_horarios", JSON.stringify(data));
    } catch(e) { console.error("Error quitando del horario", e); }
  };

  const guardar = () => {
    const anterior = alumnos.find(a=>a.id===editModal.id);
    if(editModal.estado==="baja" && anterior?.estado!=="baja") {
      quitarDeHorario(editModal.nombre);
    }
    setAlumnos(prev=>prev.map(a=>a.id===editModal.id?{...editModal,monto:PRECIOS[editModal.plan]||editModal.monto}:a));
    setEditModal(null);
  };
  const agregar    = () => {
    if(!form.nombre.trim()) return;
    setAlumnos(prev=>[...prev,{id:Date.now(),nombre:form.nombre,tipo:"skate",subtipo:form.subtipo,plan:form.plan,monto:PRECIOS[form.plan],pagado:false,mora:false,estado:"alta"}]);
    setModal(false); setForm({nombre:"",subtipo:"skate",plan:"2x"});
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div><div style={S.h2}>Alumnos</div><div style={S.sub}>{alumnos.filter(a=>a.estado!=="baja").length} activos · {alumnos.filter(a=>a.estado==="baja").length} bajas</div></div>
        <button style={S.btn("primary")} onClick={()=>setModal(true)}>+ Nuevo alumno</button>
      </div>
      <input style={S.search} placeholder="Buscar alumno..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"todos",label:"Todos"},{id:"skate",label:"🛹 Skate"},{id:"surfskate",label:"🏄 Surfskate"},{id:"deudores",label:"💰 Sin pagar"},{id:"mora",label:"⚡ Con mora"},{id:"altas",label:"🟢 Altas"},{id:"bajas",label:"🔴 Bajas"}].map(f=>(
          <button key={f.id} onClick={()=>setFiltro(f.id)} style={{...S.btn(filtro===f.id?"primary":"ghost"),fontSize:12,padding:"6px 14px"}}>{f.label}</button>
        ))}
      </div>
      <div style={S.tableWrap}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Alumno","Disciplina","Plan","Monto","Estado mes","Pago",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map(a=>(
              <tr key={a.id} style={S.rowBg(a.estado)}>
                <td style={S.td}><div style={{fontWeight:600}}>{a.nombre}</div>{a.nota&&<div style={{fontSize:11,color:"#555",marginTop:2}}>{a.nota}</div>}</td>
                <td style={S.td}><span style={{fontSize:13,color:a.subtipo==="surfskate"?"#4a9fff":"#bbb"}}>{a.subtipo==="surfskate"?"🏄 Surfskate":"🛹 Skate"}</span></td>
                <td style={{...S.td,fontSize:13,color:"#bbb"}}>{planLabel(a.plan)}</td>
                <td style={{...S.td,fontWeight:700}}>{fmt(a.monto)}</td>
                <td style={S.td}>
                  {a.estado==="alta"&&<span style={S.badge("green")}>▲ Alta</span>}
                  {a.estado==="baja"&&<span style={S.badge("red")}>▼ Baja</span>}
                  {a.estado==="activo"&&<span style={{fontSize:12,color:"#444"}}>—</span>}
                </td>
                <td style={S.td}><span style={S.badge(a.pagado?"green":a.mora?"yellow":"red")}>{a.pagado?"Pagado":a.mora?"+15% mora":"Debe"}</span></td>
                <td style={S.td}>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>togglePago(a.id)} style={{...S.btn(a.pagado?"ghost":"primary"),fontSize:12,padding:"5px 10px"}}>{a.pagado?"Desmarcar":"✓ Cobrado"}</button>
                    <button onClick={()=>setEditModal({...a})} style={{...S.btn("ghost"),fontSize:12,padding:"5px 10px"}}>✏</button>
                    <button onClick={()=>eliminar(a.id)} style={{...S.btn("ghost"),fontSize:12,padding:"5px 8px",color:"#ef5350"}}>✕</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:32,textAlign:"center",color:"#555",fontSize:14}}>Sin resultados.</div>}
      </div>

      {modal&&(
        <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div style={S.modalBox}>
            <div style={S.modalH}>Nuevo alumno</div>
            <div style={{marginBottom:16}}><label style={S.label2}>Nombre</label><input style={S.input2} value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Nombre completo"/></div>
            <div style={{marginBottom:16}}><label style={S.label2}>Disciplina</label>
              <select style={S.select2} value={form.subtipo} onChange={e=>setForm({...form,subtipo:e.target.value})}>
                <option value="skate">🛹 Skate</option><option value="surfskate">🏄 Surfskate</option>
              </select></div>
            <div style={{marginBottom:16}}><label style={S.label2}>Plan</label>
              <select style={S.select2} value={form.plan} onChange={e=>setForm({...form,plan:e.target.value})}>
                <option value="1x">1 vez/semana — $42.000</option><option value="2x">2 veces/semana — $61.000</option>
                <option value="3x">3 veces/semana — $79.000</option><option value="suelta">Clase suelta — $17.000</option>
              </select></div>
            <div style={{background:"#111",borderRadius:8,padding:"12px 16px",marginBottom:20}}>
              <div style={{fontSize:12,color:"#666",marginBottom:4}}>Cuota mensual</div>
              <div style={{fontSize:22,fontWeight:800,color:"#e8ff4a"}}>{fmt(PRECIOS[form.plan]||42000)}</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button style={S.btn("primary")} onClick={agregar}>Agregar</button>
              <button style={S.btn("ghost")} onClick={()=>setModal(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {editModal&&(
        <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setEditModal(null)}>
          <div style={S.modalBox}>
            <div style={S.modalH}>Editar — {editModal.nombre}</div>
            <div style={{marginBottom:16}}><label style={S.label2}>Teléfono</label>
              <input style={S.input2} value={editModal.tel||""} onChange={e=>setEditModal({...editModal,tel:e.target.value})} placeholder="Ej: 3492123456"/></div>
            <div style={{marginBottom:16}}><label style={S.label2}>Plan</label>
              <select style={S.select2} value={editModal.plan} onChange={e=>setEditModal({...editModal,plan:e.target.value})}>
                <option value="1x">1 vez/semana — $42.000</option><option value="2x">2 veces/semana — $61.000</option>
                <option value="3x">3 veces/semana — $79.000</option><option value="suelta">Clase suelta — $17.000</option>
              </select></div>
            <div style={{marginBottom:16}}><label style={S.label2}>Disciplina</label>
              <select style={S.select2} value={editModal.subtipo} onChange={e=>setEditModal({...editModal,subtipo:e.target.value})}>
                <option value="skate">🛹 Skate</option><option value="surfskate">🏄 Surfskate</option>
              </select></div>
            <div style={{marginBottom:16}}><label style={S.label2}>Estado</label>
              <select style={S.select2} value={editModal.estado} onChange={e=>setEditModal({...editModal,estado:e.target.value})}>
                <option value="activo">Activo</option><option value="alta">Alta</option><option value="baja">Baja</option>
              </select></div>
            <div style={{background:"#111",borderRadius:8,padding:"12px 16px",marginBottom:20}}>
              <div style={{fontSize:12,color:"#666",marginBottom:4}}>Monto del mes</div>
              <div style={{fontSize:22,fontWeight:800,color:"#e8ff4a"}}>{fmt(PRECIOS[editModal.plan]||editModal.monto)}</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button style={S.btn("primary")} onClick={guardar}>Guardar</button>
              <button style={S.btn("ghost")} onClick={()=>setEditModal(null)}>Cancelar</button>

      )}

  );

function Horarios() {
  const dias   = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
  const turnos = Object.keys(HORARIOS);

  // horarioData: igual a HORARIOS pero editable, persistido en localStorage
  const [horarioData, setHorarioData] = useState(() => {
    try {
      const saved = localStorage.getItem("galpon_horarios");
      return saved ? JSON.parse(saved) : HORARIOS;
    } catch(e) { return HORARIOS; }
  });

  const guardar = (data) => {
    setHorarioData(data);
    localStorage.setItem("galpon_horarios", JSON.stringify(data));
  };

  // Modal state
  const [modal, setModal] = useState(null); // { turno, dia }
  const [nuevoNombre, setNuevoNombre] = useState("");

  const abrirModal = (turno, dia) => { setModal({turno,dia}); setNuevoNombre(""); };
  const cerrarModal = () => { setModal(null); setNuevoNombre(""); };

  const agregarAlumno = () => {
    const n = nuevoNombre.trim(); if(!n) return;
    const data = JSON.parse(JSON.stringify(horarioData));
    data[modal.turno][modal.dia].alumnos.push(n);
    guardar(data);
    setNuevoNombre("");
  };

  const quitarAlumno = (idx) => {
    const data = JSON.parse(JSON.stringify(horarioData));
    data[modal.turno][modal.dia].alumnos.splice(idx,1);
    guardar(data);
  };

  const totalDia = dia => turnos.reduce((s,t)=>s+(horarioData[t][dia]?.alumnos?.length||0),0);

  const celdaActual = modal ? horarioData[modal.turno][modal.dia] : null;

  return (
    <div>
      <div style={S.h2}>Horarios semanales</div>
      <div style={S.sub}>Turnos tarde · Skate & Surfskate · Junio 2026</div>

      {/* Totales por día */}
      <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
        {dias.map(d=>(
          <div key={d} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"12px 18px",flex:"1 1 80px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:"#e8ff4a"}}>{totalDia(d)}</div>
            <div style={{fontSize:11,color:"#555",marginTop:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>{d}</div>
          </div>
        ))}
      </div>

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
          <thead>
            <tr style={{background:"#111"}}>
              <th style={{...S.th,width:130,background:"#111"}}>TURNO</th>
              {dias.map(d=>(
                <th key={d} style={{...S.th,textAlign:"center",color:"#e8ff4a",padding:"14px 8px"}}>
                  {d}
                  <div style={{fontSize:10,color:"#444",fontWeight:400,marginTop:2}}>{totalDia(d)} alumnos</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {turnos.map(turno=>(
              <tr key={turno} style={{borderTop:"2px solid #1e1e1e"}}>
                <td style={{...S.td,fontWeight:700,color:"#e8ff4a",fontSize:13,background:"#111",whiteSpace:"nowrap",verticalAlign:"middle",borderRight:"2px solid #1e1e1e",padding:"16px 14px"}}>
                  {turno}
                </td>
                {dias.map(dia=>{
                  const c = horarioData[turno][dia];
                  const esSurf  = c?.tipo==="surfskate";
                  const esSkate = c?.tipo==="skate";
                  return (
                    <td key={dia} style={{
                      verticalAlign:"top", padding:0,
                      background: esSurf?"rgba(74,159,255,0.05)":esSkate?"rgba(232,255,74,0.03)":"transparent",
                      borderLeft:"1px solid #1e1e1e",
                    }}>
                      {c?.tipo ? (
                        <>
                          <div style={{
                            padding:"5px 10px 4px",fontSize:10,fontWeight:700,letterSpacing:"0.06em",
                            color:esSurf?"#4a9fff":"#e8ff4a",
                            borderBottom:`1px solid ${esSurf?"#1a3050":"#2a2a14"}`,
                            display:"flex",justifyContent:"space-between",alignItems:"center"
                          }}>
                            <span>{esSurf?"🏄 SURFSKATE":"🛹 SKATE"}</span>
                            <button onClick={()=>abrirModal(turno,dia)} style={{background:"none",border:"1px solid #333",borderRadius:4,color:"#555",fontSize:10,cursor:"pointer",padding:"2px 6px"}}>✏️</button>
                          </div>
                          {c.alumnos.length>0
                            ? c.alumnos.map((a,i)=>(
                                <div key={i} style={{
                                  padding:"5px 10px",fontSize:12,color:"#ccc",
                                  borderBottom:"1px solid #191919",
                                  background:i%2===0?"transparent":"rgba(255,255,255,0.015)"
                                }}>{a}</div>
                              ))
                            : <div style={{padding:"12px 10px",fontSize:11,color:"#333",fontStyle:"italic",textAlign:"center"}}>sin alumnos</div>
                          }
                        </>
                      ) : (
                        <div style={{padding:"20px 10px",textAlign:"center",fontSize:16,color:"#1e1e1e"}}>—</div>
                      )}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{display:"flex",gap:16,marginTop:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:12,height:12,borderRadius:3,background:"rgba(232,255,74,0.15)",border:"1px solid rgba(232,255,74,0.3)"}}/>
          <span style={{fontSize:12,color:"#666"}}>Skate</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:12,height:12,borderRadius:3,background:"rgba(74,159,255,0.15)",border:"1px solid rgba(74,159,255,0.3)"}}/>
          <span style={{fontSize:12,color:"#666"}}>Surfskate</span>
        </div>
      </div>

      {/* Modal edición */}
      {modal && celdaActual && (
        <div style={S.modal} onClick={cerrarModal}>
          <div style={S.modalBox} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={S.modalH}>{modal.turno} · {modal.dia}</div>
                <div style={{fontSize:12,color:celdaActual.tipo==="surfskate"?"#4a9fff":"#e8ff4a",fontWeight:600}}>
                  {celdaActual.tipo==="surfskate"?"🏄 Surfskate":"🛹 Skate"} · {celdaActual.alumnos.length} alumnos
                </div>
              </div>
              <button onClick={cerrarModal} style={{background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>

            {/* Lista actual */}
            <div style={{marginBottom:20}}>
              {celdaActual.alumnos.length===0
                ? <div style={{color:"#444",fontSize:13,fontStyle:"italic"}}>Sin alumnos en este turno</div>
                : celdaActual.alumnos.map((a,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#111",borderRadius:8,marginBottom:6,fontSize:14,color:"#e0e0e0"}}>
                      <span>{a}</span>
                      <button onClick={()=>quitarAlumno(i)} style={{background:"none",border:"none",color:"#ef5350",fontSize:16,cursor:"pointer",padding:"0 4px"}}>✕</button>
                    </div>
                  ))
              }
            </div>

            {/* Agregar nuevo */}
            <div style={{borderTop:"1px solid #222",paddingTop:16}}>
              <label style={S.label2}>Agregar alumno</label>
              <div style={{display:"flex",gap:8,marginTop:6}}>
                <input
                  style={{...S.input2,flex:1}}
                  value={nuevoNombre}
                  onChange={e=>setNuevoNombre(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&agregarAlumno()}
                  placeholder="Nombre y apellido..."
                  autoFocus
                />
                <button onClick={agregarAlumno} style={{...S.btn("primary"),padding:"10px 16px"}} disabled={!nuevoNombre.trim()}>+ Agregar</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function WhatsApp({ alumnos }) {
  const [modo, setModo] = useState("cobro"); // cobro | mora | todos
  const [enviados, setEnviados] = useState({});

  const fmtTel = tel => {
    if(!tel) return null;
    const n = tel.replace(/\D/g,"");
    // Si empieza con 0 lo sacamos, agregamos código Argentina 54
    if(n.startsWith("0")) return "54" + n.slice(1);
    if(n.startsWith("54")) return n;
    return "54" + n;
  };

  const sinPagar  = alumnos.filter(a=>!a.pagado && a.estado!=="baja");
  const conMora   = alumnos.filter(a=>a.mora    && a.estado!=="baja");
  const activos   = alumnos.filter(a=>a.estado!=="baja");

  const lista = modo==="cobro" ? sinPagar : modo==="mora" ? conMora : activos;

  const mensaje = (a) => {
    const n = a.nombre.split(" ").slice(-1)[0]; // "Apellido Nombre" → toma el último = nombre
    const m = fmt(a.monto);
    const planTexto = a.plan==="1x"?"1 vez por semana":a.plan==="2x"?"2 veces por semana":a.plan==="3x"?"3 veces por semana":"Clase suelta";
    return `Hola ${n}! 🛹 Buenas tardes! Como cada mes te paso el recordatorio de pago.\n\nTu plan es ${planTexto} — ${m}\n\nRecordá que los pagos se hacen del 1 al 10. A partir del día 11 se aplica un recargo del 15%.\n\nGracias por tu compromiso! 😉\n\nAlias: surfealacity\nSantander — Mateo Dellasanta`;
  };

  const waLink = (a) => {
    const tel = fmtTel(a.tel);
    const msg = encodeURIComponent(mensaje(a));
    return tel ? `https://wa.me/${tel}?text=${msg}` : `https://wa.me/?text=${msg}`;
  };

  const marcarEnviado = (id) => setEnviados(prev=>({...prev,[id]:true}));

  const totalConTel    = lista.filter(a=>a.tel).length;
  const totalSinTel    = lista.filter(a=>!a.tel).length;

  return (
    <div>
      <div style={S.h2}>WhatsApp — Cobros</div>
      <div style={S.sub}>Enviá recordatorios a los alumnos con un click</div>

      {/* Selector de modo */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[
          {id:"cobro", label:`⚠ Sin pagar (${sinPagar.length})`},
          {id:"mora",  label:`⚡ Con mora (${conMora.length})`},
          {id:"todos", label:`📋 Todos los activos (${activos.length})`},
        ].map(m=>(
          <button key={m.id} onClick={()=>{setModo(m.id);setEnviados({});}} style={{...S.btn(modo===m.id?"primary":"ghost"),fontSize:13,padding:"8px 16px"}}>{m.label}</button>
        ))}
      </div>

      {/* Stats */}
      <div style={{display:"flex",gap:12,marginBottom:20}}>
        <div style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"12px 18px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:800,color:"#e8ff4a"}}>{lista.length}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Para contactar</div>
        </div>
        <div style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"12px 18px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:800,color:"#4caf50"}}>{Object.keys(enviados).length}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Enviados</div>
        </div>
        <div style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"12px 18px",flex:1,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:800,color:"#888"}}>{lista.length - Object.keys(enviados).length}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Pendientes</div>
        </div>
      </div>

      {lista.length===0 ? (
        <div style={{...S.tableWrap,padding:40,textAlign:"center",color:"#555",fontSize:15}}>
          ✓ No hay alumnos en esta categoría
        </div>
      ) : (
        <div style={S.tableWrap}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>{["Alumno","Monto","Teléfono","Mensaje",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {lista.map(a=>{
                const tel = fmtTel(a.tel);
                const enviado = enviados[a.id];
                return (
                  <tr key={a.id} style={{...S.rowBg(a.estado), opacity: enviado?0.5:1}}>
                    <td style={S.td}>
                      <div style={{fontWeight:600}}>{a.nombre}</div>
                      {a.mora&&<span style={{...S.badge("yellow"),fontSize:10,marginTop:4,display:"inline-block"}}>⚡ mora</span>}
                    </td>
                    <td style={{...S.td,fontWeight:700,color: a.mora?"#ff9800":"#f0f0f0"}}>{fmt(a.monto)}</td>
                    <td style={S.td}>
                      {tel
                        ? <span style={{fontSize:13,color:"#bbb"}}>{a.tel}</span>
                        : <span style={{fontSize:12,color:"#444",fontStyle:"italic"}}>Sin número</span>
                      }
                    </td>
                    <td style={{...S.td,fontSize:12,color:"#555",maxWidth:260}}>
                      <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{mensaje(a).slice(0,60)}…</div>
                    </td>
                    <td style={S.td}>
                      {enviado ? (
                        <span style={{fontSize:12,color:"#4caf50",fontWeight:600}}>✓ Enviado</span>
                      ) : (
                        <a
                          href={waLink(a)}
                          target="_blank"
                          rel="noreferrer"
                          onClick={()=>marcarEnviado(a.id)}
                          style={{
                            ...S.btn("primary"),
                            textDecoration:"none",
                            display:"inline-flex",alignItems:"center",gap:6,
                            fontSize:12,padding:"6px 14px",
                            opacity: tel?1:0.4,
                            pointerEvents: tel?"auto":"none",
                          }}
                        >
                          📱 {tel?"Abrir WA":"Sin número"}
                        </a>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {totalSinTel>0&&(
        <div style={{marginTop:16,fontSize:12,color:"#444"}}>
          ⚠ {totalSinTel} alumno{totalSinTel>1?"s":""} sin número cargado — agregalo desde la ficha en Alumnos.
        </div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab]   = useState("dashboard");
  const [alumnos, setAlumnos] = useState(ALUMNOS_INICIALES);
  const tabs = [
    {id:"dashboard",label:"📊 Dashboard"},
    {id:"alumnos",  label:"👥 Alumnos"},
    {id:"cobros",   label:"💰 Cobros"},
    {id:"horarios", label:"📅 Horarios"},
    {id:"whatsapp", label:"💬 WhatsApp"},
  ];
  if(!user) return <Login onLogin={setUser}/>;
  return (
    <div style={S.shell}>
      <div style={S.topbar}>
        <div style={S.topLogo}>EL GALPÓN</div>
        <div style={S.topUser}>
          <span>{user.nombre} · <span style={{color:"#444"}}>{user.rol}</span></span>
          <button style={S.logoutBtn} onClick={()=>setUser(null)}>Salir</button>
        </div>
      </div>
      <div style={S.nav}>
        {tabs.map(t=><button key={t.id} style={S.tab(tab===t.id)} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
      <div style={S.content}>
        {tab==="dashboard"&&<Dashboard alumnos={alumnos}/>}
        {tab==="alumnos"  &&<Alumnos alumnos={alumnos} setAlumnos={setAlumnos}/>}
        {tab==="cobros"   &&<Cobros alumnos={alumnos} setAlumnos={setAlumnos}/>}
        {tab==="horarios" &&<Horarios/>}
        {tab==="whatsapp" &&<WhatsApp alumnos={alumnos}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
